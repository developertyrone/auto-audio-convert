name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: |
          FMT_OUTPUT=$(gofmt -l .)
          if [ -n "$FMT_OUTPUT" ]; then
            echo "Go code is not formatted:"
            echo "$FMT_OUTPUT"
            exit 1
          fi
        shell: bash

      - name: Build
        run: go build -v ./...

      - name: Test build artifacts
        run: |
          go build -o auto-audio-convert${{ runner.os == 'Windows' && '.exe' || '' }}
          ls -lh auto-audio-convert${{ runner.os == 'Windows' && '.exe' || '' }}
        shell: bash

      - name: Test version flag
        run: ./auto-audio-convert${{ runner.os == 'Windows' && '.exe' || '' }} --version
        shell: bash
